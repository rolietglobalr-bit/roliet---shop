<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLIET - Shop Now, Pay Later</title>
    <style>
        :root{--primary-purple:#7c3aed;--accent-pink:#ec4899;--accent-orange:#f97316;--text-dark:#1f2937;--bg-light:#f3f4f6;--white:#ffffff;--success:#10b981}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-light);color:var(--text-dark);line-height:1.5}
        .header{background:var(--white);position:sticky;top:0;z-index:100;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
        .logo{font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,var(--primary-purple),var(--accent-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero{background:linear-gradient(135deg,#8b5cf6,#7c3aed,#a855f7);padding:2rem 1rem;text-align:center;color:white}
        .hero-title{font-size:2rem;font-weight:800;margin-bottom:1rem}
        .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;padding:1rem}
        .product-card{background:var(--white);border-radius:0.75rem;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
        .product-image{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg-light)}
        .product-info{padding:0.875rem}
        .product-title{font-size:0.875rem;font-weight:600;margin-bottom:0.5rem}
        .product-price{font-size:1.125rem;font-weight:700;color:var(--primary-purple)}
        .btn{padding:0.625rem;border-radius:0.5rem;font-weight:600;border:none;cursor:pointer;width:100%;margin-top:0.5rem}
        .btn-primary{background:var(--primary-purple);color:white}
        .loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;z-index:300}
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">ROLIET</div>
        <div>🛒</div>
    </header>
    
    <section class="hero">
        <h1 class="hero-title">Shop Now, Pay Later</h1>
        <p>Split payments into easy installments</p>
    </section>
    
    <div class="products-grid" id="productsGrid">
        <div class="product-card">
            <div class="product-image" style="background:linear-gradient(135deg,var(--primary-purple),var(--accent-pink));display:flex;align-items:center;justify-content:center;color:white;font-size:3rem;">📱</div>
            <div class="product-info">
                <div class="product-title">iPhone 15 Pro</div>
                <div class="product-price">$999</div>
                <button class="btn btn-primary" onclick="alert('Coming soon!')">Buy Now</button>
            </div>
        </div>
        <div class="product-card">
            <div class="product-image" style="background:linear-gradient(135deg,var(--accent-orange),#fbbf24);display:flex;align-items:center;justify-content:center;color:white;font-size:3rem;">💻</div>
            <div class="product-info">
                <div class="product-title">MacBook Pro</div>
                <div class="product-price">$1,299</div>
                <button class="btn btn-primary" onclick="alert('Coming soon!')">Buy Now</button>
            </div>
        </div>
    </div>

    <script>
        // Google Sheets API will go here
        console.log('ROLIET App Loaded');
    </script>
</body>
</html>
